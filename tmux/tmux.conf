###########################################################
## Settings
###########################################################

# Start pane numbering from 1
set -g base-index 1
set -g pane-base-index 1

# Renumber windows after removing one
set -g renumber-windows on

# Enable clipboard share
set -s set-clipboard on

# Enable mouse
set -g mouse on

# Nice colors
set -g default-terminal "xterm-256color"

# Set default shell to Fish (tries multiple paths for cross-platform support)
if-shell "[ -f /opt/homebrew/bin/fish ]" \
  "set-option -g default-shell /opt/homebrew/bin/fish" \
  "set-option -g default-shell /usr/bin/fish"

# Status bar
set -g status-right '%a %h-%d %H:%M'

# Improve escape time
set -sg escape-time 10
# }}}

###########################################################
## Bindings
###########################################################
# Use current path when splitting / tabbing
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Remap ctrl+b to ctrl+s
unbind C-b
set -g prefix C-s
bind -r C-s send-prefix

# Enable vim key binding
setw -g mode-keys vi
set -g status-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send -X begin-selection

# Use y to yank
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Detach and kill current session
bind K run-shell 'session="$(tmux display-message -p "#S")" && tmux detach-client && tmux kill-session -t "$session"'

# Resize panes with prefix + arrow keys
bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5

# Swap current windows prev / next
bind ( swap-window -t -1\; select-window -t -1
bind ) swap-window -t +1\; select-window -t +1

# Unbind ctrl + \ to toggle between panes (used for SIGQUIT)
unbind C-\;

###########################################################
## Plugins
###########################################################
set -g @plugin 'Peter-McKinney/tmux-open-file-nvim' # Press prefix + tab to open fzf and select file to open in Neovim
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'

run '$XDG_CONFIG_HOME/tmux/plugins/tpm/tpm'

# Search all windows for Neovim to open file there
set -g @tmux-open-file-nvim-search-all-windows on

# Default clipboards for text and mouse modes
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'
